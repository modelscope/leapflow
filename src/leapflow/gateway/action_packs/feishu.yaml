# Feishu/Lark action pack
#
# Each entry under 'actions:' maps to an ActionSpec.  To add a new capability,
# append an entry here — no Python code change required.
#
# Fields:
#   effect:        read | send | write | execute
#   risk_level:    low | medium | high
#   output_policy: raw | summary
#   schema:        JSON Schema subset (required[] + properties{})
#   backend.argv:  CLI argument template; {placeholder} tokens are replaced from payload
#   backend.dry_run_argv:  optional dry-run variant (adds --dry-run flag)
#
# Run 'lark-cli <domain> +<cmd> --help' to verify argv flags match the installed
# CLI version before adding or modifying entries.

version: "1"
platform: feishu

actions:

  # ── IM: Messaging ─────────────────────────────────────────────────────────

  im.send_message:
    description: >-
      Send a text message to a Feishu/Lark chat.
      Requires chat_id (oc_xxx format); use im.search_chats to resolve a
      group name to chat_id first.
    effect: send
    risk_level: high
    output_policy: summary
    capability: im.message.send
    auth:
      identities: [user, bot]
      scopes:
        common: [im:message:send_as_bot]
        user: [im:message.send_as_user, im:message]
        bot: [im:message:send_as_bot]
      resource_fields: [chat_id]
      recovery:
        missing_scope:
          recoverability: admin_required
          hint: >-
            Grant im:message:send_as_bot (bot) or im:message.send_as_user (user)
            in the Feishu developer console, then re-publish and reinstall the app.
    schema:
      required: [chat_id, text]
      properties:
        chat_id:
          type: string
          description: "Target chat ID (oc_xxx format)."
        text:
          type: string
          description: "Message text content."
        thread_id:
          type: string
          description: "Optional thread ID for replies."
    backend:
      kind: cli
      argv:
        - im
        - +messages-send
        - --chat-id
        - "{chat_id}"
        - --text
        - "{text}"
      dry_run_argv:
        - im
        - +messages-send
        - --chat-id
        - "{chat_id}"
        - --text
        - "{text}"
        - --dry-run
      approval_summary: >-
        Send a Feishu message to chat {chat_id} as {identity}
        using {binary} profile {profile}.
      next_steps:
        - "Verify the returned message_id/resource_id if the caller needs delivery tracking."
        - "If sending fails, confirm chat_id and bot/user permissions in the selected Feishu tenant."
        - "Run lark-cli auth status --json to verify the current profile remains authorized."
      timeout_s: 30

  im.list_chats:
    description: >-
      List Feishu/Lark chats the current user or bot is a member of.
      Returns chat_id and name for each chat.
      Use to discover chat_id values when only a group name is known.
    effect: read
    risk_level: low
    output_policy: raw
    capability: im.chat.read
    auth:
      identities: [user, bot]
      scopes:
        common: [im:chat:read]
      recovery:
        missing_scope:
          recoverability: admin_required
          hint: Grant im:chat:read in the Feishu developer console, then re-publish and reinstall the app.
    schema:
      properties:
        page_size:
          type: integer
          description: "Max results to return (1-100, default 20)."
    backend:
      kind: cli
      argv:
        - im
        - +chat-list
      timeout_s: 30

  im.search_chats:
    description: >-
      Search Feishu/Lark group chats by name or keyword.
      Returns matching chats with chat_id and name.
      Preferred over im.list_chats when you know the group name.
    effect: read
    risk_level: low
    output_policy: raw
    capability: im.chat.read
    auth:
      identities: [user, bot]
      scopes:
        common: [im:chat:read]
      recovery:
        missing_scope:
          recoverability: admin_required
          hint: Grant im:chat:read in the Feishu developer console, then re-publish and reinstall the app.
    schema:
      required: [query]
      properties:
        query:
          type: string
          description: "Search keyword — typically the group name or a partial name."
        page_size:
          type: integer
          description: "Max results to return (1-100, default 20)."
    backend:
      kind: cli
      argv:
        - im
        - +chat-search
        - --query
        - "{query}"
      timeout_s: 30

  im.list_messages:
    description: >-
      List messages in a Feishu/Lark chat or P2P conversation.
      Returns messages in reverse chronological order by default.
      Requires chat_id (oc_xxx format); use im.search_chats or im.list_chats
      to resolve a group name to chat_id first.
      CLI: lark-cli im +chat-messages-list (supports --start, --end, --order, --page-size flags for advanced use).
    effect: read
    risk_level: low
    output_policy: raw
    capability: im.message.read
    auth:
      identities: [user, bot]
      scopes:
        common: [im:message:readonly]
        user: [im:message.group_msg:get_as_user, im:message.p2p_msg:get_as_user, im:message.reactions:read, contact:user.base:readonly]
        bot: [im:message.group_msg, im:message.p2p_msg:readonly, im:message.reactions:read]
      resource_fields: [chat_id]
      recovery:
        missing_scope:
          recoverability: admin_required
          hint: >-
            Grant im:message:readonly (plus identity-specific scopes) in the Feishu developer console,
            then re-publish and reinstall the app.
    schema:
      required: [chat_id]
      properties:
        chat_id:
          type: string
          description: "Target chat ID (oc_xxx format)."
    backend:
      kind: cli
      argv:
        - im
        - +chat-messages-list
        - --chat-id
        - "{chat_id}"
      timeout_s: 30

  im.get_messages:
    description: >-
      Batch-fetch Feishu/Lark messages by their IDs.
      Returns full message content with sender names and reactions.
      Accepts up to 50 message IDs (om_xxx format), comma-separated.
    effect: read
    risk_level: low
    output_policy: raw
    capability: im.message.read
    auth:
      identities: [user, bot]
      scopes:
        common: [im:message:readonly]
        user: [im:message.group_msg:get_as_user, im:message.p2p_msg:get_as_user, im:message.reactions:read, contact:user.basic_profile:readonly]
        bot: [im:message.group_msg, im:message.p2p_msg:readonly, im:message.reactions:read, contact:user.base:readonly]
      recovery:
        missing_scope:
          recoverability: admin_required
          hint: Grant im:message:readonly in the Feishu developer console, then re-publish and reinstall the app.
    schema:
      required: [message_ids]
      properties:
        message_ids:
          type: string
          description: "Comma-separated message IDs (om_xxx format, max 50)."
    backend:
      kind: cli
      argv:
        - im
        - +messages-mget
        - --message-ids
        - "{message_ids}"
      timeout_s: 30

  im.search_messages:
    description: >-
      Search Feishu/Lark messages across chats by keyword.
      Returns matching messages with sender names, chat context, and reactions.
      Supports filters: chat_id (limit to specific chat), sender, time range.
      Note: requires user identity (--as user); does not work with bot identity.
      CLI: lark-cli im +messages-search (supports --chat-id, --sender, --start, --end,
      --chat-type, --is-at-me flags for advanced use).
    effect: read
    risk_level: medium
    output_policy: raw
    capability: im.message.search
    auth:
      identities: [user]
      scopes:
        user: [search:message, im:message.reactions:read, contact:user.basic_profile:readonly]
      recovery:
        missing_scope:
          recoverability: admin_required
          hint: >-
            Grant search:message and contact:user.basic_profile:readonly (user identity only)
            in the Feishu developer console, then re-publish and reinstall the app.
    schema:
      required: [query]
      properties:
        query:
          type: string
          description: "Search keyword or phrase."
    backend:
      kind: cli
      argv:
        - im
        - +messages-search
        - --query
        - "{query}"
      timeout_s: 60

  im.list_thread_messages:
    description: >-
      List messages in a Feishu/Lark thread (reply chain).
      Accepts a thread ID (omt_xxx) or a message ID (om_xxx) that belongs to a thread.
      Returns thread replies in chronological order by default.
    effect: read
    risk_level: low
    output_policy: raw
    capability: im.message.read
    auth:
      identities: [user, bot]
      scopes:
        common: [im:message:readonly]
        user: [im:message.group_msg:get_as_user, im:message.p2p_msg:get_as_user, im:message.reactions:read, contact:user.basic_profile:readonly]
        bot: [im:message.group_msg, im:message.p2p_msg:readonly, im:message.reactions:read, contact:user.base:readonly]
      recovery:
        missing_scope:
          recoverability: admin_required
          hint: Grant im:message:readonly in the Feishu developer console, then re-publish and reinstall the app.
    schema:
      required: [thread]
      properties:
        thread:
          type: string
          description: "Thread ID (omt_xxx) or message ID (om_xxx) within the thread."
    backend:
      kind: cli
      argv:
        - im
        - +threads-messages-list
        - --thread
        - "{thread}"
      timeout_s: 30

  im.reply_message:
    description: >-
      Reply to a specific message in a Feishu/Lark chat.
      Creates a threaded reply linked to the original message.
      Requires message_id (om_xxx format) of the message to reply to.
    effect: send
    risk_level: high
    output_policy: summary
    capability: im.message.send
    auth:
      identities: [user, bot]
      scopes:
        common: [im:message:send_as_bot]
        user: [im:message.send_as_user, im:message]
        bot: [im:message:send_as_bot]
      resource_fields: [message_id]
      recovery:
        missing_scope:
          recoverability: admin_required
          hint: Grant im:message:send_as_bot (bot) or im:message.send_as_user (user) in the developer console.
    schema:
      required: [message_id, text]
      properties:
        message_id:
          type: string
          description: "Message ID (om_xxx) to reply to."
        text:
          type: string
          description: "Reply text content."
    backend:
      kind: cli
      argv:
        - im
        - +messages-reply
        - --message-id
        - "{message_id}"
        - --text
        - "{text}"
      timeout_s: 30

  im.update_message:
    description: >-
      Update (edit) an existing message sent by the bot.
      Use for progressive streaming replies or correcting bot responses.
      Only works on messages sent by the current bot identity.
      Requires message_id (om_xxx format).
    effect: write
    risk_level: medium
    output_policy: summary
    capability: im.message.write
    auth:
      identities: [user, bot]
      scopes:
        common: [im:message:send_as_bot]
        user: [im:message.send_as_user, im:message]
        bot: [im:message:send_as_bot]
      resource_fields: [message_id]
      recovery:
        missing_scope:
          recoverability: admin_required
          hint: Grant im:message:send_as_bot (bot) or im:message.send_as_user (user) in the developer console.
    schema:
      required: [message_id, text]
      properties:
        message_id:
          type: string
          description: "Message ID (om_xxx) to update."
        text:
          type: string
          description: "New message text content."
    backend:
      kind: cli
      argv:
        - im
        - +messages-update
        - --message-id
        - "{message_id}"
        - --text
        - "{text}"
      timeout_s: 30

  im.add_reaction:
    description: >-
      Add an emoji reaction to a message. Use for processing indicators
      (e.g. add ⏳ when starting, ✅ when done).
      Requires message_id and emoji_type.
    effect: write
    risk_level: low
    output_policy: summary
    capability: im.message.reaction
    auth:
      identities: [user, bot]
      scopes:
        common: [im:message:readonly]
      resource_fields: [message_id]
      recovery:
        missing_scope:
          recoverability: admin_required
          hint: Grant im:message:readonly in the Feishu developer console, then re-publish and reinstall the app.
    schema:
      required: [message_id, emoji_type]
      properties:
        message_id:
          type: string
          description: "Message ID (om_xxx) to react to."
        emoji_type:
          type: string
          description: "Emoji type string (e.g. 'THUMBSUP', 'DONE', 'OnIt', 'JIAYI')."
    backend:
      kind: cli
      argv:
        - im
        - +messages-reaction-add
        - --message-id
        - "{message_id}"
        - --emoji-type
        - "{emoji_type}"
      timeout_s: 15

  im.remove_reaction:
    description: >-
      Remove an emoji reaction from a message.
      Use to clear processing indicators after completion.
    effect: write
    risk_level: low
    output_policy: summary
    capability: im.message.reaction
    auth:
      identities: [user, bot]
      scopes:
        common: [im:message:readonly]
      resource_fields: [message_id]
      recovery:
        missing_scope:
          recoverability: admin_required
          hint: Grant im:message:readonly in the Feishu developer console, then re-publish and reinstall the app.
    schema:
      required: [message_id, emoji_type]
      properties:
        message_id:
          type: string
          description: "Message ID (om_xxx) to remove reaction from."
        emoji_type:
          type: string
          description: "Emoji type string to remove."
    backend:
      kind: cli
      argv:
        - im
        - +messages-reaction-delete
        - --message-id
        - "{message_id}"
        - --emoji-type
        - "{emoji_type}"
      timeout_s: 15

  im.update_card:
    description: >-
      Update an interactive card message using a reply token from a card action callback.
      Reply tokens expire after 30 minutes and can be used at most 2 times.
      Use this to update card content in response to user button clicks or form submissions.
    effect: write
    risk_level: medium
    output_policy: summary
    capability: im.message.write
    auth:
      identities: [bot]
      scopes:
        bot: [im:message:send_as_bot]
      recovery:
        missing_scope:
          recoverability: admin_required
          hint: Grant im:message:send_as_bot in the Feishu developer console, then re-publish and reinstall the app.
    schema:
      required: [token, card]
      properties:
        token:
          type: string
          description: "Reply token from card.action.trigger callback."
        card:
          type: string
          description: "Card template JSON string or card builder output."
    backend:
      kind: cli
      argv:
        - im
        - +card-update
        - --token
        - "{token}"
        - --card
        - "{card}"
      timeout_s: 30

  im.download_resource:
    description: >-
      Download a file or image resource from a Feishu message.
      Returns the local file path after download.
      Used for processing image/file/audio attachments from inbound messages.
    effect: read
    risk_level: low
    output_policy: raw
    capability: im.message.read
    auth:
      identities: [user, bot]
      scopes:
        common: [im:message:readonly]
      resource_fields: [message_id, file_key]
      recovery:
        missing_scope:
          recoverability: admin_required
          hint: Grant im:message:readonly in the Feishu developer console, then re-publish and reinstall the app.
    schema:
      required: [message_id, file_key, type]
      properties:
        message_id:
          type: string
          description: "Message ID (om_xxx) containing the resource."
        file_key:
          type: string
          description: "Resource file key from the message payload."
        type:
          type: string
          description: "Resource type: image, file, audio, video, media."
    backend:
      kind: cli
      argv:
        - im
        - +messages-resource-download
        - --message-id
        - "{message_id}"
        - --file-key
        - "{file_key}"
        - --type
        - "{type}"
      timeout_s: 60

  # ── Docs ───────────────────────────────────────────────────────────────────

  docs.create_markdown:
    description: "Create a Feishu/Lark document from markdown content."
    effect: write
    risk_level: medium
    output_policy: summary
    capability: docs.create
    auth:
      identities: [user, bot]
      scopes:
        common: [docs:doc:create, drive:drive:write]
      recovery:
        missing_scope:
          recoverability: admin_required
          hint: Grant docs:doc:create and drive:drive:write in the Feishu developer console, then re-publish and reinstall the app.
    schema:
      required: [title, markdown]
      properties:
        title:
          type: string
          description: "Document title."
        markdown:
          type: string
          description: "Document body in Markdown format."
        folder_token:
          type: string
          description: "Optional destination folder token."
    backend:
      kind: cli
      argv:
        - docs
        - +create
        - --title
        - "{title}"
        - --markdown
        - "{markdown}"
      dry_run_argv:
        - docs
        - +create
        - --title
        - "{title}"
        - --markdown
        - "{markdown}"
        - --dry-run
      timeout_s: 60

  # ── Calendar ───────────────────────────────────────────────────────────────

  calendar.create_event:
    description: "Create a calendar event."
    effect: write
    risk_level: high
    output_policy: summary
    capability: calendar.event.write
    auth:
      identities: [user, bot]
      scopes:
        common: [calendar:calendar:write]
      recovery:
        missing_scope:
          recoverability: admin_required
          hint: Grant calendar:calendar:write in the Feishu developer console, then re-publish and reinstall the app.
    schema:
      required: [summary, start_time, end_time]
      properties:
        summary:
          type: string
          description: "Event title."
        start_time:
          type: string
          description: "Start time in ISO 8601 format (e.g. 2026-07-14T10:00:00+08:00)."
        end_time:
          type: string
          description: "End time in ISO 8601 format."
        attendees:
          type: string
          description: "Comma-separated attendee IDs or emails."
    backend:
      kind: cli
      argv:
        - calendar
        - +events-create
        - --summary
        - "{summary}"
        - --start-time
        - "{start_time}"
        - --end-time
        - "{end_time}"
      dry_run_argv:
        - calendar
        - +events-create
        - --summary
        - "{summary}"
        - --start-time
        - "{start_time}"
        - --end-time
        - "{end_time}"
        - --dry-run
      timeout_s: 45

  # ── Drive ──────────────────────────────────────────────────────────────────

  drive.search:
    description: "Search Feishu/Lark Drive resources."
    effect: read
    risk_level: medium
    output_policy: summary
    capability: drive.read
    auth:
      identities: [user, bot]
      scopes:
        common: [drive:drive]
      recovery:
        missing_scope:
          recoverability: admin_required
          hint: Grant drive:drive in the Feishu developer console, then re-publish and reinstall the app.
    schema:
      required: [query]
      properties:
        query:
          type: string
          description: "Search keyword."
        limit:
          type: integer
          description: "Max results to return."
    backend:
      kind: cli
      argv:
        - drive
        - +search
        - --query
        - "{query}"
      timeout_s: 30

  # ── Sheets ─────────────────────────────────────────────────────────────────

  sheets.append_row:
    description: "Append one row to a Feishu/Lark sheet."
    effect: write
    risk_level: medium
    output_policy: summary
    capability: sheets.write
    auth:
      identities: [user, bot]
      scopes:
        common: [sheets:spreadsheet, drive:drive]
      recovery:
        missing_scope:
          recoverability: admin_required
          hint: Grant sheets:spreadsheet and drive:drive in the Feishu developer console, then re-publish and reinstall the app.
    schema:
      required: [spreadsheet_token, sheet_id, values]
      properties:
        spreadsheet_token:
          type: string
          description: "Spreadsheet token."
        sheet_id:
          type: string
          description: "Target sheet ID within the spreadsheet."
        values:
          type: array
          description: "Row values as a JSON array."
    backend:
      kind: cli
      argv:
        - sheets
        - +append-row
        - --spreadsheet-token
        - "{spreadsheet_token}"
        - --sheet-id
        - "{sheet_id}"
        - --values
        - "{values}"
      dry_run_argv:
        - sheets
        - +append-row
        - --spreadsheet-token
        - "{spreadsheet_token}"
        - --sheet-id
        - "{sheet_id}"
        - --values
        - "{values}"
        - --dry-run
      timeout_s: 45

  # ── Mail ───────────────────────────────────────────────────────────────────

  mail.search_unread:
    description: "Search unread Feishu/Lark mail."
    effect: read
    risk_level: high
    output_policy: summary
    capability: mail.read
    auth:
      identities: [user, bot]
      scopes:
        common: [mail:mail.read]
      recovery:
        missing_scope:
          recoverability: admin_required
          hint: Grant mail:mail.read in the Feishu developer console, then re-publish and reinstall the app.
    schema:
      properties:
        query:
          type: string
          description: "Optional search keyword."
        limit:
          type: integer
          description: "Max results to return."
    backend:
      kind: cli
      argv:
        - mail
        - +search
        - --unread
      timeout_s: 30

  # ── Task ───────────────────────────────────────────────────────────────────

  task.create:
    description: "Create a Feishu/Lark task."
    effect: write
    risk_level: medium
    output_policy: summary
    capability: task.write
    auth:
      identities: [user, bot]
      scopes:
        common: [task:task:write]
      recovery:
        missing_scope:
          recoverability: admin_required
          hint: Grant task:task:write in the Feishu developer console, then re-publish and reinstall the app.
    schema:
      required: [title]
      properties:
        title:
          type: string
          description: "Task title."
        description:
          type: string
          description: "Optional task description."
        due_time:
          type: string
          description: "Optional due time in ISO 8601 format."
    backend:
      kind: cli
      argv:
        - task
        - +create
        - --title
        - "{title}"
      dry_run_argv:
        - task
        - +create
        - --title
        - "{title}"
        - --dry-run
      timeout_s: 30
