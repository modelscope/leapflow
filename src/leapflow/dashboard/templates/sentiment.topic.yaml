template: sentiment.topic
version: 1
title: "{{ title }}"
domain: sentiment
layout:
  - type: Page
    props:
      title: "{{ title }}"
    children:
      - type: Row
        children:
          - type: Gauge
            props:
              label: "Latest sentiment"
              bind: "findings[0].payload.sentiment"
          - type: Stat
            props:
              label: "Mentions"
              value: "{{ watch.finding_count }}"
      - type: Board
        props:
          title: "Mentions"
        children:
          - type: FindingCard
            repeat: findings
            as: f
            props:
              title: "{{ f.title }}"
              summary: "{{ f.summary }}"
              severity: "{{ f.severity }}"
              bind: f
            action:
              kind: intent
              name: drilldown
              params:
                finding_id: "{{ f.finding_id }}"
