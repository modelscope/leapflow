template: generic
version: 1
title: "{{ title }}"
domain: generic
# Refresh policy is consumed by session/monitor producers; harmless elsewhere.
refresh:
  batch_turns: 6
layout:
  - type: Page
    props:
      title: "{{ title }}"
    children:
      - type: Section
        props:
          title: "Executive brief"
          subtitle: "A concise operating view of the active signal stream."
        children:
          - type: Row
            children:
              - type: Stat
                props:
                  label: "Findings"
                  value: "{{ watch.finding_count }}"
              - type: PieChart
                props:
                  title: "Severity mix"
                  bind: findings
      - type: Section
        props:
          title: "Signal flow"
          subtitle: "Latest observations, formatted for quick triage rather than long-form reading."
        children:
          - type: Board
            props:
              title: Findings
            children:
              - type: FindingCard
                repeat: findings
                as: f
                props:
                  title: "{{ f.title }}"
                  summary: "{{ f.summary }}"
                  severity: "{{ f.severity }}"
                  bind: f
                action:
                  kind: intent
                  name: drilldown
                  params:
                    finding_id: "{{ f.finding_id }}"
