template: overview
version: 1
title: "{{ title }}"
domain: ""
layout:
  - type: Page
    props:
      title: "LeapBoard"
    children:
      - type: Section
        props:
          title: "Watch portfolio"
          subtitle: "Active observation lanes, grouped as a board rather than a text log."
        children:
          - type: Grid
            children:
              - type: Card
                repeat: watches
                as: w
                props:
                  title: "{{ w.name }}"
                  kicker: "{{ w.domain }}"
                action:
                  kind: nav
                  name: openWatch
                  params:
                    target: "{{ w.watch_id }}"
                children:
                  - type: Row
                    children:
                      - type: Badge
                        props:
                          label: "{{ w.state }}"
                          tone: info
                      - type: Stat
                        props:
                          label: "Findings"
                          value: "{{ w.finding_count }}"
                  - type: Markdown
                    props:
                      text: "{{ w.trigger }}"
      - type: Section
        props:
          title: "Recent findings"
          subtitle: "A refreshed evidence stream with severity mix and the latest observations."
        children:
          - type: Grid
            children:
              - type: BarChart
                props:
                  title: "Severity mix"
                  bind: findings
              - type: Timeline
                props:
                  bind: findings
              - type: Board
                props:
                  title: Findings
                children:
                  - type: FindingCard
                    repeat: findings
                    as: f
                    props:
                      title: "{{ f.title }}"
                      summary: "{{ f.summary }}"
                      severity: "{{ f.severity }}"
                      bind: f
                    action:
                      kind: intent
                      name: drilldown
                      params:
                        finding_id: "{{ f.finding_id }}"
