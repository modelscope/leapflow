template: research.paper
version: 1
title: "{{ title }}"
domain: research
layout:
  - type: Page
    props:
      title: "{{ title }}"
    children:
      - type: Board
        props:
          title: "New papers"
        children:
          - type: FindingCard
            repeat: findings
            as: f
            props:
              title: "{{ f.title }}"
              summary: "{{ f.summary }}"
              severity: "{{ f.severity }}"
              bind: f
            action:
              kind: nav
              name: openLink
              params:
                url: "{{ f.payload.url }}"
