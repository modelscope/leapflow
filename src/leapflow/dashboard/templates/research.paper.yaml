template: research.paper
version: 1
title: "{{ title }}"
domain: research
layout:
  - type: Page
    props:
      title: "{{ title }}"
    children:
      - type: Section
        props:
          title: "Research pipeline"
          subtitle: "New papers are organized as a decision funnel: signal mix, timeline, then source links."
        children:
          - type: Grid
            children:
              - type: PieChart
                props:
                  title: "Severity mix"
                  bind: findings
              - type: Timeline
                props:
                  bind: findings
      - type: Section
        props:
          title: "New papers"
          subtitle: "Abstracts are clipped for readability; open source links for the full paper."
        children:
          - type: Board
            props:
              title: "New papers"
            children:
              - type: FindingCard
                repeat: findings
                as: f
                props:
                  title: "{{ f.title }}"
                  summary: "{{ f.summary }}"
                  severity: "{{ f.severity }}"
                  bind: f
                action:
                  kind: nav
                  name: openLink
                  params:
                    url: "{{ f.payload.url }}"
