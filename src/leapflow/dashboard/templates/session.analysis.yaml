template: session.analysis
version: 1
title: "Session Analysis"
domain: session
refresh:
  batch_turns: 6
  use_model_salience: true
layout:
  - type: Page
    props:
      title: "Session Analysis"
    children:
      - type: StoryPanel
        props:
          title: "Story"
          text: "{{ analysis.story }}"
      - type: Grid
        children:
          - type: Card
            props:
              title: "Insights"
            children:
              - type: InsightCard
                repeat: analysis.insights
                as: i
                props:
                  title: "{{ i.title }}"
                  summary: "{{ i.summary }}"
                  severity: "{{ i.severity }}"
                  bind: i
          - type: Card
            props:
              title: "Action items"
            children:
              - type: List
                props:
                  bind: analysis.action_items
          - type: Card
            props:
              title: "Decisions"
            children:
              - type: List
                props:
                  bind: analysis.decisions
          - type: Card
            props:
              title: "Open questions"
            children:
              - type: List
                props:
                  bind: analysis.open_questions
          - type: Card
            props:
              title: "Entities"
            children:
              - type: List
                props:
                  bind: analysis.entities
      - type: Card
        props:
          title: "Suggested next prompts"
        children:
          - type: SuggestionChips
            props:
              bind: analysis.next_prompts
