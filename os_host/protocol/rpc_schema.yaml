# LeapFlow OS Host — RPC Protocol Schema
# All platform implementations MUST conform to this schema.
# Framing: 4-byte big-endian length prefix + MsgPack body.

version: 1

# ─── Frame Envelope ────────────────────────────────────────────────────────────
framing:
  encoding: msgpack
  length_prefix: 4  # bytes, big-endian unsigned int
  max_frame_size: 33554432  # 32 MiB

envelope:
  request:
    fields: { v: int, type: "request", id: string, method: string, params: map }
  response:
    fields: { v: int, type: "response", id: string, ok: bool, result?: any, error?: error_object }
  event:
    fields: { v: int, type: "event", event: string, payload: map }

error_object:
  fields: { code: string, message: string, details: map }

# ─── RPC Methods ──────────────────────────────────────────────────────────────
methods:
  # System
  ping:
    params: {}
    result: { pong: bool }
    required_capability: null

  system.info:
    params: {}
    result: { platform: string, platform_id: string, os_version: string, hostname: string }
    required_capability: null

  system.manifest:
    params: {}
    result: { platform_id: string, os_version: string, capabilities: [string], metadata: map }
    required_capability: null

  # File Operations
  file.list:
    params: { path?: string, include_hidden?: bool }
    result: { entries: [file_entry] }
    required_capability: file.ops

  file.move:
    params: { src: string, dst: string }
    result: { ok: bool }
    required_capability: file.ops

  file.copy:
    params: { src: string, dst: string }
    result: { ok: bool }
    required_capability: file.ops

  file.delete:
    params: { path: string }
    result: { ok: bool }
    required_capability: file.ops

  # Filesystem Watch
  fs.subscribe:
    params: { path: string }
    result: { subscription_id: string }
    required_capability: fs.watch

  # Accessibility / UI Tree
  ax.tree:
    params: { bundle_id?: string, prefer_intents?: bool }
    result: map  # platform-specific tree structure
    required_capability: ax.tree_read

  ax.perform:
    params: { node_id: string, action: string, params?: map }
    result: map
    required_capability: ax.perform_action

  # Application Control
  app.launch:
    params: { bundle_id: string }
    result: { ok: bool }
    required_capability: app.launch

  app.activate:
    params: { bundle_id: string }
    result: { ok: bool }
    required_capability: app.activate

  app.list:
    params: { filter?: string, running_only?: bool }
    result: [{ bundle_id: string, name: string, running: bool }]
    required_capability: app.launch

  # Clipboard
  clipboard.get:
    params: {}
    result: { text: string, change_count: int }
    required_capability: clipboard.read

  clipboard.set:
    params: { text: string }
    result: { ok: bool }
    required_capability: clipboard.read

  clipboard.last_change:
    params: {}
    result: { text: string, change_count: int, ts: float }
    required_capability: clipboard.read

  # Input Injection
  input.type_text:
    params: { text: string, method?: string }
    result: { ok: bool }
    required_capability: ax.perform_action

  input.shortcut:
    params: { keys: string }
    result: { ok: bool }
    required_capability: ax.perform_action

  # App Intents (platform-specific, optional)
  intent.discover:
    params: { app_bundle_id?: string }
    result: map
    required_capability: app_intents.discover

  intent.perform:
    params: { intent_name: string, params?: map }
    result: map
    required_capability: app_intents.perform

  # Screen Capture
  screen.start_capture:
    params: { quality?: float, scale?: float }
    result: { ok: bool }
    required_capability: screen.capture

  screen.stop_capture:
    params: {}
    result: { ok: bool }
    required_capability: screen.capture

  screen.capture_frame:
    params: { region?: { x: float, y: float, w: float, h: float }, bundle_id?: string }
    result: { base64: string, width: int, height: int, ts: float }
    required_capability: screen.capture

  screen.permission_status:
    params: {}
    result: { granted: bool }
    required_capability: null

  # Recording Mode
  recording.start:
    params: { mode?: string }
    result: { ok: bool }
    required_capability: recording.mode

  recording.stop:
    params: {}
    result: { ok: bool }
    required_capability: recording.mode

  # Video Recording
  video.start:
    params: { output_dir?: string, fps?: int }
    result: { ok: bool, path?: string }
    required_capability: video.recording

  video.stop:
    params: {}
    result: { ok: bool, path?: string }
    required_capability: video.recording

  video.pause:
    params: {}
    result: { ok: bool }
    required_capability: video.recording

  video.resume:
    params: {}
    result: { ok: bool }
    required_capability: video.recording

  video.extract_frame:
    params: { ts?: float }
    result: { base64: string, width: int, height: int }
    required_capability: video.recording

# ─── Server-Push Events ───────────────────────────────────────────────────────
events:
  event.fs_change:
    payload: { path: string, flags: int, semantic_actions: [string], ts: float }

  event.clipboard_change:
    payload: { text: string, change_count: int, ts: float }

  event.app_focus_change:
    payload: { bundle_id: string, app_name: string, ts: float }

  event.ui_action:
    payload: { action_type: string, target: map, ts: float }

  event.context_change:
    payload: { context: map, ts: float }

  event.screen_frame_captured:
    payload: { base64: string, width: int, height: int, ts: float }

# ─── Capabilities Registry ────────────────────────────────────────────────────
# Each platform declares which capabilities it supports at handshake time.
capabilities:
  - fs.watch
  - ax.tree_read
  - ax.perform_action
  - clipboard.read
  - clipboard.watch
  - file.ops
  - app.launch
  - app.activate
  - shell.exec
  - notification.send
  - app.focus_watch
  - recording.mode
  - screen.capture
  - video.recording
  # Platform-specific (optional)
  - fs.semantic_index        # macOS Tahoe
  - app_intents.discover     # macOS Tahoe
  - app_intents.perform      # macOS Tahoe
  - screen.capture_gpu       # macOS Tahoe
